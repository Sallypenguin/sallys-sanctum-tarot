<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sally’s Sanctum Tarot</title>
  <meta name="description" content="Sally’s Sanctum Tarot。ステンドグラスの大アルカナを使う、象徴的内省のための静的タロットWebアプリ。" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/render.css" />
  <script src="js/card-pool.js" defer></script>
  <script src="js/tarot-engine.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/history-store.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <p class="eyebrow">Stained Glass Major Arcana</p>
      <h1 class="site-title" aria-label="Sally’s Sanctum Tarot">
        <span class="title-owner">Sally’s</span>
        <span class="title-main">Sanctum Tarot</span>
      </h1>
      <p class="subtitle">ステンドグラスの大アルカナで、祝福・欲望・変容・世界を読む、象徴的内省のための本格ミニマム版です。</p>
      <nav class="page-nav" aria-label="ページ移動">
        <a class="button-link" href="index.html">カードを引く</a>
        <a class="button-link secondary" href="cards.html">カード図鑑</a>
        <a class="button-link secondary" href="history.html">記録を見る</a>
        <a class="button-link secondary" href="about.html">このデッキについて</a>
        <a class="button-link secondary" href="policy.html">サイトポリシー</a>
      </nav>
    </header>

    <section class="panel" aria-label="タロット占い">
      <div class="setting-grid">
        <label class="select-label" for="context">
          <span>相談テーマ</span>
          <select id="context">
            <option value="general">総合</option>
            <option value="love">恋愛・関係性</option>
            <option value="work">仕事・活動</option>
            <option value="selfCare">セルフケア</option>
            <option value="creativity">創作</option>
          </select>
        </label>

        <label class="toggle-label" for="use-reversals">
          <input type="checkbox" id="use-reversals" checked />
          <span>逆位置を使う</span>
        </label>

        <label class="toggle-label" for="sound-enabled">
          <input type="checkbox" id="sound-enabled" checked />
          <span>サウンド</span>
        </label>

        <label class="toggle-label" for="animation-enabled">
          <input type="checkbox" id="animation-enabled" checked />
          <span>アニメーション</span>
        </label>
      </div>

      <section class="spread-picker" aria-labelledby="spread-picker-title">
        <p id="spread-picker-title" class="spread-picker__prompt">問いに合う読み方を選んでください。</p>
        <div class="spread-options" aria-label="読み方を選択">
          <button type="button" id="draw-one" class="spread-option">
            <span class="spread-option__name">ワンオラクル</span>
            <span class="spread-option__desc">一枚で象徴を受け取る</span>
          </button>
          <button type="button" id="draw-three" class="spread-option">
            <span class="spread-option__name">スリーカード</span>
            <span class="spread-option__desc">過去・現在・未来の流れを見る</span>
          </button>
          <button type="button" id="draw-triad" class="spread-option">
            <span class="spread-option__name">トライアド</span>
            <span class="spread-option__desc">状況・障害・助言の三つの鍵で読む</span>
          </button>
        </div>
      </section>


      <div id="spread" class="reading-root" aria-live="polite"></div>
    </section>

    <footer class="app-footer" aria-label="サイト情報">
      <nav class="footer-links" aria-label="関連ページ">
        <a href="index.html">カードを引く</a>
        <a href="cards.html">カード図鑑</a>
        <a href="history.html">記録を見る</a>
        <a href="about.html">このデッキについて</a>
        <a href="policy.html">サイトポリシー</a>
      </nav>
      <p>© 2026 Sally’s Sanctum Tarot. Created by Sally. For symbolic reflection only.</p>
    </footer>
  </main>

  <button type="button" id="back-to-top" class="back-to-top" aria-label="ページ上部へ戻る" title="ページ上部へ戻る">↑</button>

  <audio id="flip-sound" src="sounds/card-flip.mp3" preload="auto"></audio>
  <audio id="synergy-sound" src="sounds/synergy-flash.mp3" preload="auto"></audio>
</body>
</html>
