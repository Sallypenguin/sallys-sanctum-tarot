<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sally’s Sanctum Tarot</title>
  <meta name="description" content="Sally’s Sanctum Tarot。ステンドグラスの大アルカナを使う、AIなしのタロットWebアプリ。" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/render.css" />
  <script src="js/card-pool.js" defer></script>
  <script src="js/tarot-engine.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <p class="eyebrow">Stained Glass Major Arcana</p>
      <h1 class="site-title" aria-label="Sally’s Sanctum Tarot">
        <span class="title-owner">Sally’s</span>
        <span class="title-main">Sanctum Tarot</span>
      </h1>
      <p class="subtitle">ステンドグラスの大アルカナで、祝福・欲望・変容・世界を読む、AIなしの本格ミニマム版です。</p>
    </header>

    <section class="panel" aria-label="タロット占い">
      <div class="setting-grid">
        <label class="select-label" for="context">
          <span>相談テーマ</span>
          <select id="context">
            <option value="general">総合</option>
            <option value="love">恋愛・関係性</option>
            <option value="work">仕事・活動</option>
            <option value="selfCare">セルフケア</option>
            <option value="creativity">創作</option>
          </select>
        </label>

        <label class="toggle-label" for="use-reversals">
          <input type="checkbox" id="use-reversals" checked />
          <span>逆位置を使う</span>
        </label>
      </div>

      <div class="controls" aria-label="操作">
        <button type="button" id="draw-one">一枚引き</button>
        <button type="button" id="draw-three">三枚引き</button>
        <button type="button" id="reset" class="secondary">リセット</button>
        <button type="button" id="toggle-library" class="secondary">カード一覧</button>
      </div>

      <div id="spread" class="reading-root" aria-live="polite"></div>
    </section>

    <section id="library" class="panel library" hidden aria-label="カード一覧">
      <h2>カード一覧</h2>
      <p class="subtitle">カードプール内の基本解釈、位置別解釈、相談テーマ別解釈、オリジナル解釈、シナジー情報を確認できます。</p>
      <div id="library-grid" class="library-grid"></div>
    </section>

    <footer class="app-footer" aria-label="サイト情報">
      <p>© 2026 Sally’s Sanctum Tarot. Created by Sally. For symbolic reflection only.</p>
    </footer>
  </main>

  <button type="button" id="back-to-top" class="back-to-top" aria-label="ページ上部へ戻る" title="ページ上部へ戻る">↑</button>

  <audio id="flip-sound" src="sounds/card-flip.mp3" preload="auto"></audio>
  <audio id="synergy-sound" src="sounds/synergy-flash.mp3" preload="auto"></audio>
</body>
</html>
